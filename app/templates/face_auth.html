<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Điểm danh</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      background: #f0f0f0;
    }

    button {
      padding: 20px 40px;
      font-size: 24px;
      font-weight: bold;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      background-color: #4CAF50;
      color: white;
      transition: all 0.3s ease;
    }

    button:hover {
      background-color: #45a049;
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(2px);
    }
  </style>
</head>
<body>
  <form action="http://127.0.0.1:8000/webrtc/offer" method="get">
    <button type="submit">Bắt đầu điểm danh</button>
  </form>
</body>
</html>
